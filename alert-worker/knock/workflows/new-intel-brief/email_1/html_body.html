<table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#1a1a1a;">
  <tr>
    <td style="padding:32px 24px 16px;">
      <span style="font-size:20px;font-weight:700;">Tastematter</span>
    </td>
  </tr>
  <tr>
    <td style="padding:0 24px;">
      <hr style="border:none;border-top:1px solid #e5e5e5;margin:0;" />
    </td>
  </tr>
  <tr>
    <td style="padding:24px;">
      <p style="font-size:16px;font-weight:600;margin:0 0 8px;">{{ subject }}</p>
      <p style="font-size:14px;color:#555;line-height:1.6;margin:0 0 16px;">{{ body }}</p>
      {% if trigger_type %}
      <p style="font-size:12px;color:#888;margin:0 0 4px;">Trigger: {{ trigger_type }}</p>
      {% endif %}
      {% if url %}
      <a href="{{ url }}" style="display:inline-block;padding:10px 20px;background:#3b82f6;color:#fff;text-decoration:none;border-radius:6px;font-size:14px;font-weight:500;margin-top:12px;">View Details</a>
      {% endif %}
    </td>
  </tr>
  <tr>
    <td style="padding:0 24px;">
      <hr style="border:none;border-top:1px solid #e5e5e5;margin:0;" />
    </td>
  </tr>
  <tr>
    <td style="padding:16px 24px 32px;">
      <p style="font-size:12px;color:#999;margin:0;">Sent by Tastematter Context Alerting</p>
      <p style="font-size:12px;color:#999;margin:4px 0 0;">You received this because you have alerts enabled for this engagement.</p>
    </td>
  </tr>
</table>
