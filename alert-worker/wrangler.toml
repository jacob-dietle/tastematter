name = "tastematter-alert-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
account_id = "4c8353a21e0bfc69a1e036e223cba4d8"

[triggers]
crons = ["0 */4 * * *"]

[[d1_databases]]
binding = "ALERTS_DB"
