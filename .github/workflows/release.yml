name: Release

on:
  push:
    tags: ['v*']

env:
  R2_BUCKET: tastematter-releases

jobs:
  promote-to-production:
    name: Promote Staging to Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          region = auto
          no_check_bucket = true
          EOF
          sed -i 's/^[[:space:]]*//' ~/.config/rclone/rclone.conf

      - name: Verify staging artifacts exist
        run: |
          echo "Checking staging artifacts..."
          STAGING_FILES=$(rclone ls "r2:$R2_BUCKET/staging/latest/" 2>/dev/null | wc -l)
          if [ "$STAGING_FILES" -lt 4 ]; then
            echo "ERROR: Staging artifacts not found or incomplete"
            echo "Expected 4 binaries, found: $STAGING_FILES"
            echo ""
            echo "Did you push to master before tagging?"
            echo "Workflow: push to master → staging builds → verify → tag for release"
            exit 1
          fi
          echo "Found $STAGING_FILES staging artifacts"
          rclone ls "r2:$R2_BUCKET/staging/latest/"

      - name: Promote staging to production
        run: |
          VERSION=${{ github.ref_name }}
          echo "Promoting staging to production: $VERSION"

          # Copy from staging/latest/ to releases/v*/
          rclone copy "r2:$R2_BUCKET/staging/latest/" "r2:$R2_BUCKET/releases/$VERSION/"

          # Update latest.txt
          echo "$VERSION" > latest.txt
          rclone copy latest.txt "r2:$R2_BUCKET/"
          echo "Updated latest.txt to $VERSION"

      - name: Upload install scripts
        run: |
          echo "Uploading install scripts..."
          rclone copy scripts/install/install.ps1 "r2:$R2_BUCKET/"
          rclone copy scripts/install/install.sh "r2:$R2_BUCKET/"
          rclone copy scripts/install/scoop/ "r2:$R2_BUCKET/scoop/"
          rclone copy scripts/install/homebrew/ "r2:$R2_BUCKET/brew/"
          echo "Install scripts uploaded"

      - name: Download artifacts for GitHub release
        run: |
          VERSION=${{ github.ref_name }}
          mkdir -p release-files
          rclone copy "r2:$R2_BUCKET/releases/$VERSION/" release-files/
          ls -la release-files/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: release-files/*
          retention-days: 1

  smoke-test-production:
    name: Smoke Test Production ${{ matrix.os }}
    needs: promote-to-production
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            shell: pwsh
          - os: ubuntu-latest
            shell: bash
          - os: macos-latest
            shell: bash
    steps:
      - name: Install from production (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Write-Host "Installing from production..."
          Invoke-RestMethod https://install.tastematter.dev/install.ps1 | Invoke-Expression

      - name: Install from production (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          echo "Installing from production..."
          curl -fsSL https://install.tastematter.dev/install.sh | bash

      - name: Verify binary works (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $env:Path = "$env:USERPROFILE\.local\bin;$env:Path"
          tastematter --version
          tastematter --help

      - name: Verify binary works (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          tastematter --version
          tastematter --help

  create-github-release:
    name: Create GitHub Release
    needs: smoke-test-production
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: release-files

      - name: List release files
        run: ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-files/*
          generate_release_notes: true
          body: |
            ## Install

            **Windows (PowerShell):**
            ```powershell
            irm https://install.tastematter.dev/install.ps1 | iex
            ```

            **macOS/Linux:**
            ```bash
            curl -fsSL https://install.tastematter.dev/install.sh | bash
            ```

            **Scoop (Windows):**
            ```powershell
            scoop bucket add tastematter https://install.tastematter.dev/scoop
            scoop install tastematter
            ```

            **Homebrew (macOS):**
            ```bash
            brew tap jacob-dietle/tastematter https://install.tastematter.dev/brew
            brew install tastematter
            ```

            ## Manual Download

            Download the binary for your platform from the assets below, then add to your PATH.
