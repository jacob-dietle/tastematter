name: Staging

on:
  push:
    branches: [master]

env:
  R2_BUCKET: tastematter-releases

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: tastematter-windows-x86_64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: tastematter-linux-x86_64
          - os: macos-15-intel  # Intel runner for x86_64
            target: x86_64-apple-darwin
            artifact: tastematter-darwin-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: tastematter-darwin-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core -> target
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --manifest-path core/Cargo.toml --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp core/target/${{ matrix.target }}/release/tastematter ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "core\target\${{ matrix.target }}\release\tastematter.exe" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 7

  upload-staging:
    name: Upload to Staging
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone for R2
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          region = auto
          no_check_bucket = true
          EOF
          sed -i 's/^[[:space:]]*//' ~/.config/rclone/rclone.conf

      - name: Upload binaries to staging
        run: |
          COMMIT_SHA="${{ github.sha }}"
          echo "Uploading staging build: $COMMIT_SHA"

          # Clear and upload to staging/latest/
          rclone delete "r2:$R2_BUCKET/staging/latest/" --rmdirs || true

          for artifact_dir in artifacts/*/; do
            artifact_name=$(basename "$artifact_dir")
            echo "Uploading $artifact_name..."
            rclone copy "artifacts/$artifact_name/$artifact_name" "r2:$R2_BUCKET/staging/latest/"
          done

          # Update staging-latest.txt with commit SHA
          echo "$COMMIT_SHA" > staging-latest.txt
          rclone copy staging-latest.txt "r2:$R2_BUCKET/"
          echo "Updated staging-latest.txt to $COMMIT_SHA"

      - name: Upload install scripts to staging
        run: |
          echo "Uploading install scripts..."
          rclone copy scripts/install/install.ps1 "r2:$R2_BUCKET/"
          rclone copy scripts/install/install.sh "r2:$R2_BUCKET/"
          echo "Install scripts uploaded"

  smoke-test:
    name: Smoke Test ${{ matrix.os }}
    needs: upload-staging
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            shell: pwsh
          - os: ubuntu-latest
            shell: bash
          - os: macos-latest
            shell: bash
    steps:
      - name: Install from staging (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          TASTEMATTER_CHANNEL: staging
        run: |
          Write-Host "Installing from staging channel..."
          $env:TASTEMATTER_CHANNEL = "staging"
          Invoke-RestMethod https://install.tastematter.dev/install.ps1 | Invoke-Expression

      - name: Install from staging (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        env:
          TASTEMATTER_CHANNEL: staging
        run: |
          echo "Installing from staging channel..."
          curl -fsSL https://install.tastematter.dev/install.sh | bash

      - name: Verify binary works (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $env:Path = "$env:USERPROFILE\.local\bin;$env:Path"
          tastematter --version
          tastematter --help

      - name: Verify binary works (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          tastematter --version
          tastematter --help

      - name: Test fresh init flow (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $env:Path = "$env:USERPROFILE\.local\bin;$env:Path"

          # 1. Remove any existing DB to simulate fresh machine
          Remove-Item "$env:USERPROFILE\.context-os" -Recurse -Force -ErrorAction SilentlyContinue

          # 2. daemon once creates DB + schema (no sessions, shouldn't crash)
          tastematter daemon once 2>&1 | Out-String
          # daemon once may exit non-zero if no sessions found, that's OK

          # 3. DB should now exist
          if (-not (Test-Path "$env:USERPROFILE\.context-os\context_os_events.db")) {
            throw "DB was not created by daemon once"
          }

          # 4. context command should return valid JSON on empty DB
          $result = tastematter context "test" --format json | ConvertFrom-Json
          if (-not $result.receipt_id) { throw "Missing receipt_id" }
          if ($result.executive_summary.status -notin @("healthy","warning","stale","unknown")) {
            throw "Invalid status: $($result.executive_summary.status)"
          }
          Write-Host "FRESH INIT: ALL CHECKS PASSED"

      - name: Test fresh init flow (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"

          # 1. Remove any existing DB to simulate fresh machine
          rm -rf ~/.context-os

          # 2. daemon once creates DB + schema (no sessions, shouldn't crash)
          tastematter daemon once 2>&1 || true

          # 3. DB should now exist
          test -f ~/.context-os/context_os_events.db || { echo "DB was not created"; exit 1; }

          # 4. context command should return valid JSON on empty DB
          tastematter context "test" --format json | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          assert 'receipt_id' in d, 'Missing receipt_id'
          assert d['executive_summary']['status'] in ['healthy','warning','stale','unknown'], f'Bad status: {d[\"executive_summary\"][\"status\"]}'
          print('FRESH INIT: ALL CHECKS PASSED')
          "

  # ==========================================================================
  # E2E User Experience Test
  # Simulates a real first-time user: install Claude Code → generate sessions
  # → install tastematter from staging → run full workflow → assert results
  # ==========================================================================
  e2e-test:
    name: E2E Test ${{ matrix.os }}
    needs: upload-staging
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      # Stage 1: Environment Setup
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Stage 2: Install Claude Code
      - name: Install Claude Code
        shell: bash
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      # Stage 3: Generate real session data
      - name: Create test project
        shell: bash
        run: |
          mkdir -p "$HOME/test-project/src"
          printf 'def hello():\n    print("hello world")\n' > "$HOME/test-project/src/main.py"
          printf '# Test Project\nA simple project for E2E testing.\n' > "$HOME/test-project/README.md"
          printf '{"name": "test", "version": "1.0.0"}\n' > "$HOME/test-project/package.json"

      - name: Generate Claude Code sessions
        shell: bash
        run: |
          cd "$HOME/test-project"

          # Session 1: Simple file listing (tool_use: Read, Bash)
          claude -p "What files are in this project? List them." \
            --output-format json --allowedTools "Read,Bash" --max-turns 3 --model haiku || true

          # Session 2: Code analysis (tool_use: Read, Grep)
          claude -p "Read main.py and explain what it does." \
            --output-format json --allowedTools "Read,Grep" --max-turns 3 --model haiku || true

          # Session 3: Code generation (tool_use: Read, Write)
          claude -p "Add a test file for main.py using pytest." \
            --output-format json --allowedTools "Read,Write" --max-turns 5 --model haiku || true

          # Session 4: Multi-tool (tool_use: Bash, Read)
          claude -p "Run 'python src/main.py' and show the output." \
            --output-format json --allowedTools "Bash,Read" --max-turns 3 --model haiku || true

          # Session 5: Emoji/unicode stress (6.1 - UTF-8 in real sessions)
          claude -p "Add a comment to main.py with these emoji: 🚀🎉✨ and explain what the function does 🤖" \
            --output-format json --allowedTools "Read,Write" --max-turns 3 --model haiku || true

      - name: Verify session data exists
        shell: bash
        run: |
          sleep 2
          SESSION_COUNT=$(find "$HOME/.claude" -name "*.jsonl" 2>/dev/null | wc -l | tr -d ' ')
          echo "Session JSONL files found: $SESSION_COUNT"
          if [ "$SESSION_COUNT" -lt 1 ]; then
            echo "::warning::No JSONL session files generated by Claude Code"
          fi

      # Stage 4: Install tastematter from staging
      - name: Install tastematter (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TASTEMATTER_CHANNEL: staging
        run: |
          $env:TASTEMATTER_CHANNEL = "staging"
          Invoke-RestMethod https://install.tastematter.dev/install.ps1 | Invoke-Expression

      - name: Install tastematter (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TASTEMATTER_CHANNEL: staging
        run: |
          TASTEMATTER_CHANNEL=staging curl -fsSL https://install.tastematter.dev/install.sh | bash

      - name: Verify tastematter
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          tastematter --version

      # Stage 5: Run full workflow
      - name: Run daemon once
        shell: bash
        continue-on-error: true
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          tastematter daemon once 2>&1 | tee "$GITHUB_WORKSPACE/e2e-daemon-output.txt"

      - name: Run queries
        shell: bash
        continue-on-error: true
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          tastematter query flex --time 30d --format json > "$GITHUB_WORKSPACE/e2e-query-output.json" || true
          tastematter context "test" --format json > "$GITHUB_WORKSPACE/e2e-context-output.json" || true
          tastematter query heat --format json > "$GITHUB_WORKSPACE/e2e-heat-output.json" || true
          tastematter query chains --format json > "$GITHUB_WORKSPACE/e2e-chains-output.json" || true

      # Stage 6: Hard assertions (release gate)
      - name: Assert performance budget (6.8 - daemon < 5s)
        shell: bash
        run: |
          DURATION=$(grep -o '"duration_ms": *[0-9]*' "$GITHUB_WORKSPACE/e2e-daemon-output.txt" | grep -o '[0-9]*')
          echo "Daemon duration: ${DURATION:-unknown}ms"
          if [ -z "$DURATION" ]; then
            echo "::warning::Could not extract duration_ms from daemon output"
          elif [ "$DURATION" -gt 5000 ]; then
            echo "::error::Daemon exceeded 5s performance budget: ${DURATION}ms"
            exit 1
          else
            echo "Performance budget OK: ${DURATION}ms < 5000ms"
          fi

      - name: Assert no panics in daemon output
        shell: bash
        run: |
          if [ -f "$GITHUB_WORKSPACE/e2e-daemon-output.txt" ]; then
            if grep -qi "panicked\|assertion failed" "$GITHUB_WORKSPACE/e2e-daemon-output.txt"; then
              echo "::error::FATAL: daemon panicked during session parse"
              cat "$GITHUB_WORKSPACE/e2e-daemon-output.txt"
              exit 1
            fi
            echo "No panics detected in daemon output"
          else
            echo "::warning::daemon output file not found"
          fi

      - name: Assert query returned results
        shell: bash
        run: |
          if [ -f "$GITHUB_WORKSPACE/e2e-query-output.json" ]; then
            RESULT_COUNT=$(jq '.result_count // 0' "$GITHUB_WORKSPACE/e2e-query-output.json" 2>/dev/null || echo "0")
            echo "Query result_count: $RESULT_COUNT"
            if [ "$RESULT_COUNT" -lt 1 ]; then
              echo "::error::query returned 0 results after parsing sessions"
              cat "$GITHUB_WORKSPACE/e2e-query-output.json"
              exit 1
            fi
            echo "Query returned $RESULT_COUNT results"
          else
            echo "::error::query output file not found"
            exit 1
          fi

      - name: Assert context restore works
        shell: bash
        run: |
          if [ -f "$GITHUB_WORKSPACE/e2e-context-output.json" ]; then
            RECEIPT=$(jq -r '.receipt_id // empty' "$GITHUB_WORKSPACE/e2e-context-output.json" 2>/dev/null)
            if [ -z "$RECEIPT" ]; then
              echo "::error::context command returned no receipt_id"
              cat "$GITHUB_WORKSPACE/e2e-context-output.json"
              exit 1
            fi
            echo "Context restore receipt_id: $RECEIPT"
          else
            echo "::error::context output file not found"
            exit 1
          fi

      # Stage 6b: Assertions on heat and chains output
      - name: Assert heat has results (6.6)
        shell: bash
        run: |
          if [ -f "$GITHUB_WORKSPACE/e2e-heat-output.json" ]; then
            HEAT_COUNT=$(jq '.results | length' "$GITHUB_WORKSPACE/e2e-heat-output.json" 2>/dev/null || echo "0")
            echo "Heat results count: $HEAT_COUNT"
            if [ "$HEAT_COUNT" -lt 1 ]; then
              echo "::error::Heat query returned 0 results"
              cat "$GITHUB_WORKSPACE/e2e-heat-output.json"
              exit 1
            fi
            echo "Heat pipeline OK: $HEAT_COUNT files with heat scores"
          else
            echo "::error::Heat output file not found"
            exit 1
          fi

      - name: Assert chains has results (6.7)
        shell: bash
        run: |
          if [ -f "$GITHUB_WORKSPACE/e2e-chains-output.json" ]; then
            CHAIN_COUNT=$(jq '.total_chains // 0' "$GITHUB_WORKSPACE/e2e-chains-output.json" 2>/dev/null || echo "0")
            echo "Chain count: $CHAIN_COUNT"
            if [ "$CHAIN_COUNT" -lt 1 ]; then
              echo "::error::Chains query returned 0 chains"
              cat "$GITHUB_WORKSPACE/e2e-chains-output.json"
              exit 1
            fi
            echo "Chain pipeline OK: $CHAIN_COUNT chains discovered"
          else
            echo "::error::Chains output file not found"
            exit 1
          fi

      # Stage 6c: Stress scenarios (modify DB state — run after all first-run assertions)
      - name: Assert idempotency - daemon twice (6.2)
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # Extract first run session count
          FIRST_COUNT=$(grep -o '"sessions_parsed": *[0-9]*' "$GITHUB_WORKSPACE/e2e-daemon-output.txt" | grep -o '[0-9]*')
          echo "First daemon run: sessions_parsed=$FIRST_COUNT"

          # Run daemon a second time
          tastematter daemon once > "$GITHUB_WORKSPACE/e2e-daemon-output-2.txt" 2>&1 || true
          SECOND_COUNT=$(grep -o '"sessions_parsed": *[0-9]*' "$GITHUB_WORKSPACE/e2e-daemon-output-2.txt" | grep -o '[0-9]*')
          echo "Second daemon run: sessions_parsed=$SECOND_COUNT"

          if [ "$FIRST_COUNT" != "$SECOND_COUNT" ]; then
            echo "::error::Idempotency violation: first=$FIRST_COUNT second=$SECOND_COUNT"
            exit 1
          fi
          echo "Idempotency OK: both runs returned $FIRST_COUNT sessions"

      - name: Assert DB recovery (6.3)
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # Delete the database
          rm -rf ~/.context-os/context_os_events.db
          echo "DB deleted"

          # Re-run daemon — should recreate DB and re-parse all sessions
          tastematter daemon once > "$GITHUB_WORKSPACE/e2e-daemon-recovery.txt" 2>&1 || true
          RECOVERY_COUNT=$(grep -o '"sessions_parsed": *[0-9]*' "$GITHUB_WORKSPACE/e2e-daemon-recovery.txt" | grep -o '[0-9]*')
          echo "Recovery run: sessions_parsed=$RECOVERY_COUNT"

          if [ -z "$RECOVERY_COUNT" ] || [ "$RECOVERY_COUNT" -lt 1 ]; then
            echo "::error::DB recovery failed: sessions_parsed=$RECOVERY_COUNT after DB delete + re-run"
            cat "$GITHUB_WORKSPACE/e2e-daemon-recovery.txt"
            exit 1
          fi
          echo "DB recovery OK: $RECOVERY_COUNT sessions recovered after DB deletion"

      - name: Assert zero-width time query (6.4)
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          tastematter query flex --time 0d --format json > "$GITHUB_WORKSPACE/e2e-zero-time.json" 2>&1
          ZERO_COUNT=$(jq '.result_count // -1' "$GITHUB_WORKSPACE/e2e-zero-time.json" 2>/dev/null || echo "-1")
          echo "Zero-width time query result_count: $ZERO_COUNT"

          if [ "$ZERO_COUNT" = "-1" ]; then
            echo "::error::Zero-width time query failed to return valid JSON"
            cat "$GITHUB_WORKSPACE/e2e-zero-time.json"
            exit 1
          fi
          echo "Zero-width time query OK: returned $ZERO_COUNT results (expected 0)"

      - name: Assert context on empty project (6.5)
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          tastematter context "nonexistent_project_xyz_12345" --format json > "$GITHUB_WORKSPACE/e2e-empty-project.json" 2>&1 || true
          RECEIPT=$(jq -r '.receipt_id // empty' "$GITHUB_WORKSPACE/e2e-empty-project.json" 2>/dev/null)
          echo "Empty project receipt_id: $RECEIPT"

          if [ -z "$RECEIPT" ]; then
            echo "::error::Context on empty project returned no receipt_id"
            cat "$GITHUB_WORKSPACE/e2e-empty-project.json"
            exit 1
          fi
          echo "Empty project context OK: receipt_id=$RECEIPT"

      # Stage 7: Agent quality evaluation (non-blocking, informational only)
      - name: Agent quality evaluation
        if: always()
        shell: bash
        continue-on-error: true
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd "$GITHUB_WORKSPACE"

          # Build combined output for evaluation
          {
            echo "== DAEMON OUTPUT =="
            cat e2e-daemon-output.txt 2>/dev/null || echo "(not available)"
            echo ""
            echo "== QUERY FLEX OUTPUT =="
            cat e2e-query-output.json 2>/dev/null || echo "(not available)"
            echo ""
            echo "== CONTEXT RESTORE OUTPUT =="
            cat e2e-context-output.json 2>/dev/null || echo "(not available)"
            echo ""
            echo "== HEAT OUTPUT =="
            cat e2e-heat-output.json 2>/dev/null || echo "(not available)"
            echo ""
            echo "== CHAINS OUTPUT =="
            cat e2e-chains-output.json 2>/dev/null || echo "(not available)"
          } > e2e-combined-output.txt

          # Run Claude evaluation
          EVAL_RESULT=$(claude -p "You are evaluating the first-run experience of a CLI tool called tastematter. A fresh user installed it on a clean machine and ran daemon, query, context, heat, and chains commands. Review the outputs below and produce a Markdown quality report. Rate overall experience 1-10. List issues with severity CRITICAL/HIGH/MEDIUM/LOW.

          $(cat e2e-combined-output.txt)" \
            --output-format json --max-turns 1 --model haiku 2>/dev/null) || true

          if [ -n "$EVAL_RESULT" ]; then
            echo "$EVAL_RESULT" | jq -r '.result // "No evaluation produced"' > e2e-quality-report.md 2>/dev/null \
              || echo "$EVAL_RESULT" > e2e-quality-report.md
          else
            printf '# Quality Evaluation\n\nEvaluation could not be run.\n' > e2e-quality-report.md
          fi

          # Warn if rating is below threshold
          RATING=$(grep -oE '[0-9]+/10' e2e-quality-report.md 2>/dev/null | head -1 | cut -d/ -f1) || true
          if [ -n "$RATING" ] && [ "$RATING" -lt 7 ] 2>/dev/null; then
            echo "::warning::E2E quality rating: $RATING/10 (below threshold of 7)"
          elif [ -n "$RATING" ]; then
            echo "Quality rating: $RATING/10"
          fi

      # Stage 8: Upload all artifacts
      - name: Upload E2E artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-${{ matrix.os }}
          path: |
            e2e-daemon-output.txt
            e2e-daemon-output-2.txt
            e2e-daemon-recovery.txt
            e2e-query-output.json
            e2e-context-output.json
            e2e-heat-output.json
            e2e-chains-output.json
            e2e-zero-time.json
            e2e-empty-project.json
            e2e-quality-report.md
            e2e-combined-output.txt
          retention-days: 7
